# https://ssl-config.mozilla.org/#server=nginx&version=1.27.3&config=modern&openssl=3.4.0&guideline=5.7

# =========================
# syl.red HTTP -> HTTPS
# =========================
server {
	listen 80;
	server_name syl.red www.syl.red;
	return 301 https://$host$request_uri;
}

# =========================
# notes.syl.red HTTP -> HTTPS
# =========================
server {
	listen 80;
	server_name notes.syl.red;
	return 301 https://$host$request_uri;
}

# =========================
# Main website
# =========================
server {
	listen 443 ssl http2;
	server_name syl.red www.syl.red;

	root /var/www/html/syl.red;
	index index.php index.html;
	
	ssl_certificate /etc/nginx/ssl/origin-certificate.pem;
	ssl_certificate_key /etc/nginx/ssl/syl.red-private-key.key;
	ssl_protocols TLSv1.3;
	ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
	ssl_ecdh_curve X25519:prime256v1:secp384r1;
	ssl_prefer_server_ciphers off;

	access_log /var/log/nginx/syl.red.log;
	error_log /var/log/nginx/syl.red-error.log error;


	# Redirect /notes to the notes subdomain
	location = /nav/notes {
		return 301 https://notes.syl.red/;
	}

	# Redirect /notes/... to notes.syl.red/...
	location ^~ /nav/notes/ {
		rewrite ^/nav/notes/(.*)$ https://notes.syl.red/$1 permanent;
	}


	# Root resolve
	location / {
		try_files $uri $uri/ /index.php$is_args$args;
	}


	# Send php files to php-fpm
	location ~ \.php$ {
		fastcgi_split_path_info ^(.+\.php)(/.+)$;
		fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
		fastcgi_index index.php;
		include fastcgi.conf;
	}


	# Block dotfiles except .well-known directory
	location ~ /\.(?!well-known).* {
		# help i am a teapot /d-face
		return 418;
	}


	# Add security headers
	add_header Strict-Transport-Security "max-age=31536000";
	add_header X-Frame-Options "DENY";
	add_header X-Content-Type-Options "nosniff";

	# unsafe inline for style-src-attr is an acceptable risk for my hobby website.
	# I do not allow any user or third-party content.
	add_header Content-Security-Policy "default-src 'self'; style-src 'self'; script-src 'self'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'; upgrade-insecure-requests; form-action 'none'; style-src-attr 'unsafe-inline'; img-src 'self' data: blob:;";

	add_header Referrer-Policy "same-origin";


	# Ultimate AI Block List v1.7 20250924
	include /etc/nginx/snippets/ai-block-list.conf;
}

# =========================
# Notes subdomain
# =========================
server {
	listen 443 ssl http2;
	server_name notes.syl.red www.notes.syl.red;

	root /var/www/html/syl.red/nav/notes;
	index index.php index.html;
	
